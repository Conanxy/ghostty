name: Release macOS ARM64 DMG

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "tabbar-preview-0.1"
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "tabbar-preview-*"

permissions:
  contents: write

concurrency:
  group: release-macos-arm64-dmg-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS ARM64 DMG
    runs-on: macos-26
    timeout-minutes: 90
    env:
      ZIG_LOCAL_CACHE_DIR: /tmp/zig-local-cache
      ZIG_GLOBAL_CACHE_DIR: /tmp/zig-global-cache
      DERIVED_DATA_DIR: /tmp/ghostty-derived-data
      BUILD_DIR: /tmp/ghostty-build
      DMG_NAME: ghostty-macos-arm64-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.dmg
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ghostty

      - name: Xcode Version
        run: xcodebuild -version

      - name: Prepare build cache directories
        run: |
          mkdir -p "$ZIG_LOCAL_CACHE_DIR" "$ZIG_GLOBAL_CACHE_DIR" "$DERIVED_DATA_DIR" "$BUILD_DIR"

      - name: Build GhosttyKit
        run: |
          APP_VERSION="$(awk -F'"' '/\.version =/ { print $2; exit }' build.zig.zon)"
          BUILD_VERSION="${APP_VERSION}+tabbar.${GITHUB_SHA:0:8}"
          printf 'Building Ghostty version %s\n' "$BUILD_VERSION"

          nix develop -c zig build \
            --global-cache-dir "$ZIG_GLOBAL_CACHE_DIR" \
            --cache-dir "$ZIG_LOCAL_CACHE_DIR" \
            -Doptimize=ReleaseFast \
            -Dversion-string="$BUILD_VERSION" \
            -Dxcframework-target=native \
            -Demit-macos-app=false

      - name: Build Ghostty.app
        run: |
          xcodebuild \
            -project macos/Ghostty.xcodeproj \
            -scheme Ghostty \
            -configuration ReleaseLocal \
            -derivedDataPath "$DERIVED_DATA_DIR" \
            SYMROOT="$BUILD_DIR" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Verify app
        run: |
          file "$BUILD_DIR/ReleaseLocal/Ghostty.app/Contents/MacOS/ghostty"
          "$BUILD_DIR/ReleaseLocal/Ghostty.app/Contents/MacOS/ghostty" --version
          codesign --verify --deep --strict --verbose=4 "$BUILD_DIR/ReleaseLocal/Ghostty.app"

      - name: Create DMG
        run: |
          DMG_STAGING_DIR="/tmp/ghostty-dmg"
          rm -rf "$DMG_STAGING_DIR" "$DMG_NAME"
          mkdir -p "$DMG_STAGING_DIR"

          ditto "$BUILD_DIR/ReleaseLocal/Ghostty.app" "$DMG_STAGING_DIR/Ghostty.app"
          ln -s /Applications "$DMG_STAGING_DIR/Applications"

          hdiutil create \
            -volname "Ghostty" \
            -fs HFS+ \
            -format UDZO \
            -srcfolder "$DMG_STAGING_DIR" \
            "$DMG_NAME"
          hdiutil verify "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghostty-macos-arm64-dmg
          path: ${{ env.DMG_NAME }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          cat > release-notes.md <<'EOF'
          macOS Apple Silicon DMG for the configurable tab bar preview.

          This build is produced by GitHub Actions from commit `${{ github.sha }}`.

          Notes:
          - Apple Silicon only (`arm64`).
          - Built with the local release signing configuration. If this repository has no Developer ID notarization secrets configured, macOS may still require the first launch to be approved manually.
          EOF

          PRERELEASE="${INPUT_PRERELEASE:-true}"
          release_flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "macOS ARM64 tab bar preview $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${release_flags[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "macOS ARM64 tab bar preview $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${release_flags[@]}"
          fi

          gh release upload "$RELEASE_TAG" "$DMG_NAME" --clobber
